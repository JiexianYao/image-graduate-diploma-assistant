version: '3.8'

services:
  app:
    build: .
    ports:
      - "9001:9001"
    environment:
      # в”Җв”Җ и…ҫи®Ҝдә‘ COSпјҲеҝ…еЎ«пјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - COS_BUCKET=${COS_BUCKET}
      - PRESIGN_EXPIRE=${PRESIGN_EXPIRE:-3600}
      # в”Җв”Җ LLMпјҲеҸҜйҖүпјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-claude-3-5-sonnet-20241022}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.anthropic.com}
      - LLM_API_STYLE=${LLM_API_STYLE:-anthropic}
      # в”Җв”Җ жңҚеҠЎй…ҚзҪ® в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - API_TOKEN=${API_TOKEN:-}
      - PORT=${PORT:-9001}
    # дёҚеҶҚйңҖиҰҒжң¬ең° data/ еҚ·пјҢжүҖжңүжҢҒд№…ж•°жҚ®еӯҳеӮЁеңЁ COS
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
